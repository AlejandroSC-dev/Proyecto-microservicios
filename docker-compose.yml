services:

  # =========================
  # 🗄️ Base de datos (User)
  # =========================
  mysql-user:
    image: mysql:8
    container_name: mysql-user-db
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_DATABASE: user_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_user_data:/var/lib/mysql
    networks:
      - microservices-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-padmin"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =========================
  # 🗄️ Base de datos (Product)
  # =========================
  mysql-product:
    image: mysql:8
    container_name: mysql-product-db
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_DATABASE: product_db
    ports:
      - "3308:3306"
    volumes:
      - mysql_product_data:/var/lib/mysql
    networks:
      - microservices-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-padmin"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =========================
  # 🧭 Eureka Server
  # =========================
  eureka-server:
    build: ./springboot-eureka
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - microservices-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =========================
  # 🚪 API Gateway
  # =========================
  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      eureka-server:
        condition: service_healthy
    networks:
      - microservices-net
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/

  # =========================
  # 👤 User Service
  # =========================
  user-service:
    build: ./user-service
    container_name: user-service
    ports:
      - "8082:8082"
    depends_on:
      eureka-server:
        condition: service_healthy
      mysql-user:
        condition: service_healthy
    networks:
      - microservices-net
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-user:3306/user_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: admin
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/

  # =========================
  # 📦 Product Service
  # =========================
  product-service:
    build: ./product-service
    container_name: product-service
    ports:
      - "8081:8081"
    depends_on:
      eureka-server:
        condition: service_healthy
      mysql-product:
        condition: service_healthy
    networks:
      - microservices-net
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-product:3306/product_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: admin
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/

# =========================
# 🌐 Red
# =========================
networks:
  microservices-net:
    driver: bridge

# =========================
# 💾 Volúmenes
# =========================
volumes:
  mysql_user_data:
  mysql_product_data: